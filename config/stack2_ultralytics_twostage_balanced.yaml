logging:
  level: INFO

pipeline:
  device: auto
  fps: 20
  buffer_size: 4
  max_frames: null
  metrics_interval_sec: 2
  sequence_len: 16

ingestion:
  rtsp_reconnect_sec: 2.0
  rtsp_max_retries: 5
  webcam_requested_fps: 30
  webcam_width: 960
  webcam_height: 540

streams:
  - stream_id: stack2_balanced
    type: webcam
    source: 0

detection:
  backend: ultralytics
  model_path: models/yolo11n.pt
  conf_threshold: 0.45
  person_class_id: 0

pose:
  backend: ultralytics_pose
  model_path: models/yolo11n-pose.pt
  input_size: 256
  match_iou_threshold: 0.1

tracking:
  iou_threshold: 0.3
  max_misses: 20

features:
  min_keypoint_conf: 0.25

rules:
  bed_edge_distance_px: 40.0
  sitting_edge_seconds: 5.0
  sudden_drop_vy: 220.0
  sudden_drop_ay: 1000.0
  lean_angle_deg: 30.0
  lean_std_deg: 8.0
  inactivity_speed_px_s: 7.0
  inactivity_seconds: 18.0
  transition_window_sec: 15.0
  transition_threshold: 4
  enable_sitting_edge_rule: false
  enable_fall_rule: true
  enable_lean_instability_rule: true
  enable_inactivity_rule: true
  enable_transition_rule: true

temporal_model:
  backend: heuristic
  model_path: models/temporal_gru.pt

risk:
  ml_weight: 0.35
  medium_threshold: 0.45
  high_threshold: 0.7
  critical_threshold: 0.9
  allow_ml_level_override: true
  ema_alpha: 0.30
  downgrade_grace_sec: 2.5

output:
  json_log_path: output/alerts_stack2_balanced.jsonl
  enable_rest_api: true
  rest_api_host: 0.0.0.0
  rest_api_port: 8000
  live_stream:
    enabled: true
    jpeg_quality: 80
  visualization:
    enabled: true
    show_bboxes: true
    show_pose: true
    show_tracks: true
    show_risk: true
    show_bed_zones: false
    show_fps: true
    keypoint_conf_threshold: 0.25
    window_scale: 1.0
    quit_key: q
    quit_keys: [q, esc]
